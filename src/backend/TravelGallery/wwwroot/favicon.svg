<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="url(#sky)"/>
  <!-- Sun -->
  <circle cx="48" cy="14" r="9" fill="#fbbf24"/>
  <!-- Back mountain -->
  <polygon points="4,52 24,20 44,52" fill="#64748b" opacity="0.6"/>
  <!-- Front mountain -->
  <polygon points="20,52 40,14 60,52" fill="#334155"/>
  <!-- Snow cap -->
  <polygon points="40,14 34,26 40,23 46,26" fill="#f1f5f9"/>
  <!-- Ground -->
  <rect y="52" width="64" height="12" rx="0" fill="#16a34a"/>
</svg>
